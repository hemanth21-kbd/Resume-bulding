<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 0;
        }
        .ai-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 750px;
            margin: 0 auto;
        }
        .ai-card h2 {
            color: #667eea;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .ai-card .subtitle {
            color: #666;
            margin-bottom: 25px;
        }
        .form-label {
            font-weight: 600;
            color: #333;
        }
        .btn-ai {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
        }
        .btn-ai:hover {
            opacity: 0.9;
            color: white;
        }
        .note {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 12px 15px;
            border-radius: 5px;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ai-card">
            <div class="text-center mb-4">
                <h2>✨ AI Resume Builder</h2>
                <p class="subtitle">Fill in your details and let AI generate a professional resume for you.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" enctype="multipart/form-data">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name *</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" name="phone">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" name="address">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Target Job Title</label>
                    <input type="text" class="form-control" name="job_title" placeholder="e.g. Software Engineer">
                </div>

                <div class="mb-3">
                    <label class="form-label">Experience / Background Summary</label>
                    <textarea class="form-control" name="experience" rows="4" placeholder="Describe your experience, key projects, and what you're looking for..."></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label"><b>Select Resume Template</b></label>
                    <select class="form-select" name="template">
                        <option value="modern">Modern Resume</option>
                        <option value="classic">Classic Resume</option>
                        <option value="professional">Professional Resume</option>
                        <option value="minimal">Minimal Resume</option>
                        <option value="creative">Creative Resume</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label"><b>Profile Photo</b></label>
                    <input type="file" class="form-control" name="photo" accept="image/*">
                </div>

                <button type="submit" class="btn btn-ai">
                    ✨ Generate Resume with AI
                </button>

                <a href="/" class="btn btn-secondary w-100 mt-3">Back to Dashboard</a>
            </form>
        </div>
    </div>
</body>
</html>
