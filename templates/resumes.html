<!DOCTYPE html>
<html>
<head>
    <title>All Resumes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h1 class="text-center mb-4">Resume Dashboard</h1>

<div class="row mb-4">

<div class="col-md-6">

<a href="/resume" class="btn btn-success">
+ Create Resume
</a>

</div>

<div class="col-md-6">

<form action="/search" method="GET" class="d-flex">

<input
type="text"
name="name"
class="form-control me-2"
placeholder="Search Resume">

<button class="btn btn-primary">
Search
</button>

</form>

</div>

</div>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for resume in resumes %}

<tr>

<td>{{ resume.id }}</td>
<td>{{ resume.name }}</td>
<td>{{ resume.email }}</td>
<td>{{ resume.phone }}</td>

<td>

<a href="/edit/{{ resume.id }}" class="btn btn-warning btn-sm">
Edit
</a>

<a href="/delete/{{ resume.id }}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this Resume?')">
Delete
</a>

<a href="/download/{{ resume.id }}"
class="btn btn-primary btn-sm">
PDF
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</body>
</html>
