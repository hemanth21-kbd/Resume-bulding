<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Resume</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning text-dark">

<h2>Edit Resume</h2>

</div>

<div class="card-body">

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label>Full Name</label>
<input type="text" class="form-control" name="name" value="{{ resume.name }}">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" name="email" value="{{ resume.email }}">
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" class="form-control" name="phone" value="{{ resume.phone }}">
</div>

<div class="mb-3">
<label>Address</label>
<input type="text" class="form-control" name="address" value="{{ resume.address }}">
</div>

<div class="mb-3">
<label>Career Objective</label>
<textarea class="form-control" name="objective" rows="3">{{ resume.objective }}</textarea>
</div>

<div class="mb-3">
<label>Skills</label>
<textarea class="form-control" name="skills" rows="3">{{ resume.skills }}</textarea>
</div>

<div class="mb-3">
<label>Education</label>
<textarea class="form-control" name="education" rows="3">{{ resume.education }}</textarea>
</div>

<div class="mb-3">
<label>Projects</label>
<textarea class="form-control" name="projects" rows="3">{{ resume.projects }}</textarea>
</div>

<div class="mb-3">
<label>Certifications</label>
<textarea class="form-control" name="certifications" rows="3">{{ resume.certifications }}</textarea>
</div>

<div class="mb-3">
<label>Achievements</label>
<textarea class="form-control" name="achievements" rows="3">{{ resume.achievements }}</textarea>
</div>

<div class="mb-3">
<label>Languages</label>
<textarea class="form-control" name="languages" rows="3">{{ resume.languages }}</textarea>
</div>

<div class="mb-3">
<label>Hobbies</label>
<textarea class="form-control" name="hobbies" rows="3">{{ resume.hobbies }}</textarea>
</div>

<h3 class="mt-4">Experience</h3>

<div class="mb-3">
<label>Responsibilities</label>
<textarea class="form-control" name="responsibilities" rows="4">{{ resume.responsibilities }}</textarea>
</div>

<div class="mb-3">
<label>Profile Photo</label>
<input type="file" class="form-control" name="photo">
</div>

{% if resume.photo %}
<img src="{{ url_for('static', filename='uploads/' + resume.photo) }}"
width="120"
class="mb-3 rounded-circle border">
{% endif %}

<br>

<button class="btn btn-success">
Update Resume
</button>

<a href="/resumes" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</div>

</body>
</html>
