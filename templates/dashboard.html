<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resume Builder</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f5f5;
}

.card{
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}
</style>

</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-5">
Resume Builder Dashboard
</h1>

<div class="row">

<div class="col-md-4">

<div class="card shadow">

<div class="card-body text-center">

<h3>📝 Create Resume</h3>

<p>Create a new resume.</p>

<a href="/resume" class="btn btn-success">
Create
</a>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow">

<div class="card-body text-center">

<h3>📂 View Resumes</h3>

<p>View all saved resumes.</p>

<a href="/resumes" class="btn btn-primary">
Open
</a>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow">

<div class="card-body text-center">

<h3>📊 Total Resumes</h3>

<h1>{{ total }}</h1>

</div>

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-md-4">

<div class="card shadow">

<div class="card-body text-center">

<h3>✨ AI Resume Builder</h3>

<p>Generate a resume with AI.</p>

<a href="/ai-resume" class="btn btn-warning">
Open AI Builder
</a>

</div>

</div>

</div>

</div>

</div>

<footer class="text-center mt-5 mb-3">

<hr>

<p>
© 2026 Resume Builder
</p>

</footer>

</body>
</html>
