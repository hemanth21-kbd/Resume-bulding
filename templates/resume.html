<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Resume</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h2>Create Resume</h2>
</div>

<div class="card-body">

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" name="name" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" name="email" required>
</div>

<div class="mb-3">
<label class="form-label">Phone</label>
<input type="text" class="form-control" name="phone" required>
</div>

<div class="mb-3">
<label class="form-label">Address</label>
<input type="text" class="form-control" name="address" required>
</div>

<div class="mb-3">
<label class="form-label">Career Objective</label>
<textarea class="form-control" name="objective" rows="3"></textarea>
</div>

<div class="mb-3">
<label class="form-label">Skills</label>
<textarea class="form-control" name="skills" rows="3"></textarea>
</div>

<div class="mb-3">
<label class="form-label">Education</label>
<textarea class="form-control" name="education" rows="3"></textarea>
</div>

<div class="mb-3">
<label class="form-label">Projects</label>
<textarea class="form-control" name="projects" rows="3"></textarea>
</div>



<div class="mb-3">
    <label class="form-label">Certifications</label>
    <textarea name="certifications" class="form-control" rows="3"></textarea>
</div>

<div class="mb-3">
    <label class="form-label">Achievements</label>
    <textarea name="achievements" class="form-control" rows="3"></textarea>
</div>

<div class="mb-3">
    <label class="form-label">Languages</label>
    <textarea name="languages" class="form-control" rows="3"></textarea>
</div>

<div class="mb-3">
    <label class="form-label">Hobbies</label>
    <textarea name="hobbies" class="form-control" rows="3"></textarea>
</div>




<div class="mb-3">
    <label class="form-label"><b>Select Resume Template</b></label>

    <select class="form-select" name="template">
        <option value="modern">Modern Resume</option>
        <option value="classic">Classic Resume</option>
        <option value="professional">Professional Resume</option>
        <option value="minimal">Minimal Resume</option>
        <option value="creative">Creative Resume</option>
    </select>
</div>

<div class="mb-3">
    <label class="form-label"><b>Profile Photo</b></label>
    <input type="file" class="form-control" name="photo" accept="image/*">
</div>

<button type="submit" class="btn btn-success">
    Save Resume
</button>

<a href="/" class="btn btn-secondary">
    Back
</a>

</form>

</div>

</div>

</div>

</body>
</html>
